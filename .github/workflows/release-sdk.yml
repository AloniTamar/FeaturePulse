name: Release SDK Tag

on:
  push:
    tags:
      - 'sdk-v*'

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag created
        run: |
          echo "Tag ${{ github.ref_name }} pushed — JitPack will build automatically."
          echo "SDK available at: https://jitpack.io/#TamarAloni/FeaturePulse/${{ github.ref_name }}"
